buildscript {
  ext.SkiaKit = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return SkiaKit[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

def reactNativeArchitectures() {
  def value = rootProject.getProperties().get("reactNativeArchitectures")
  return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply from: '../nitrogen/generated/android/skiakit+autolinking.gradle'

apply plugin: "com.facebook.react"

// In a monorepo, the React codegen plugin generates delegate/spec classes
// for ALL native modules found in the workspace (including peer dependencies
// like gesture-handler, reanimated, skia, etc.). These same classes are also
// generated by the actual module packages in the consuming app, causing
// "duplicate class" errors during dex merging.
// Fix: Only keep codegen files that belong to THIS library (SkiaKit).
afterEvaluate {
  def codegenDir = file("${buildDir}/generated/source/codegen/java/com/facebook")
  tasks.matching { it.name.startsWith("generateCodegen") }.configureEach { task ->
    task.doLast {
      def specsDir = file("${codegenDir}/fbreact/specs")
      def viewManagersDir = file("${codegenDir}/react/viewmanagers")

      // Only keep files that belong to this library
      def ownPrefixes = ["NativeSkiaKit", "SkiaKit"]

      [specsDir, viewManagersDir].each { dir ->
        if (dir.exists()) {
          dir.listFiles().each { f ->
            def isOwn = ownPrefixes.any { prefix -> f.name.startsWith(prefix) }
            if (!isOwn) {
              f.delete()
              logger.warn("[SkiaKit] Removed peer dep codegen file: ${f.name}")
            }
          }
        }
      }
    }
  }
}


android {
  namespace "com.margelo.nitro.skiakit"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")

    externalNativeBuild {
      cmake {
        cppFlags "-frtti -fexceptions -Wall -fstack-protector-all"
        arguments "-DANDROID_STL=c++_shared", "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
        abiFilters (*reactNativeArchitectures())

        buildTypes {
          debug {
            cppFlags "-O1 -g"
          }
          release {
            cppFlags "-O2"
          }
        }
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  packagingOptions {
    excludes = [
      "META-INF",
      "META-INF/**",
      "**/libc++_shared.so",
      "**/libfbjni.so",
      "**/libjsi.so",
      "**/libfolly_json.so",
      "**/libfolly_runtime.so",
      "**/libglog.so",
      "**/libhermes.so",
      "**/libhermes-executor-debug.so",
      "**/libhermes_executor.so",
      "**/libreactnative.so",
      "**/libreactnativejni.so",
      "**/libturbomodulejsijni.so",
      "**/libreact_nativemodule_core.so",
      "**/libjscexecutor.so"
    ]
  }

  buildFeatures {
    buildConfig true
    prefab true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation project(":react-native-nitro-modules")
}

react {
  jsRootDir = file("../src")
  libraryName = "SkiaKit"
  codegenJavaPackageName = "com.margelo.nitro.skiakit"
}
